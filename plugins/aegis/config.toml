# Codex configuration for Aegis
#
# Copy the block below into your ~/.codex/config.toml (or merge it). It registers
# the Aegis MCP server so Codex can capture, track, and report on team work
# through the aegis_* tools.
#
# ---------------------------------------------------------------------------
# Option A (recommended): Aegis Server over Streamable HTTP.
# The Codex plugin uses this shape by default for local self-host installs.
# ---------------------------------------------------------------------------
[mcp_servers.aegis]
url = "http://localhost:8787/mcp"
bearer_token_env_var = "AEGIS_TOKEN"

# ---------------------------------------------------------------------------
# Option B: remote Aegis Server over Streamable HTTP (URL + bearer).
# ---------------------------------------------------------------------------
# [mcp_servers.aegis]
# url = "https://aegis.example.com/mcp"
# bearer_token_env_var = "AEGIS_TOKEN"

# ---------------------------------------------------------------------------
# Option C: local stdio server via the `aegis-mcp` binary.
# Use this only for offline/dev workflows where Codex should bypass
# `aegis-server`.
# ---------------------------------------------------------------------------
# [mcp_servers.aegis]
# command = "aegis-mcp"
# env = { AEGIS_SQLITE_PATH = "/path/to/aegis.db" }
